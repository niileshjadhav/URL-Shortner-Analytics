version: '1.0'

services:
  db:
    image: postgres:15
    container_name: url_shortener
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: url_shortener
    ports:
      - "5437:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

